<div *ngIf="loading" class="detail-card detail-state">
  <p>Loading song details...</p>
</div>

<div *ngIf="!loading && !song" class="detail-card detail-state">
  <p>Song details not found.</p>
</div>

<div *ngIf="!loading && song" class="detail-card">
  <h2 class="detail-title">{{ song.title }}</h2>
  <p><strong>Artist:</strong> {{ song.artistName || 'Unknown' }}</p>
  <p><strong>Genre:</strong> {{ song.genre || '-' }}</p>
  <p><strong>Duration:</strong> {{ song.duration ? (song.duration + ' sec') : '-' }}</p>
</div>
