<section class="favorites-page">
  <h2 class="favorites-title">My Favorites</h2>

  <p *ngIf="loading" class="favorites-state">Loading favorites...</p>
  <p *ngIf="!loading && errorMessage" class="ui-message ui-message-error favorites-state">{{ errorMessage }}</p>
  <p *ngIf="!loading && favorites.length === 0 && !errorMessage" class="favorites-state">No favorites yet.</p>

  <div *ngFor="let song of favorites" class="favorite-row">
    <div class="song-main">
      <p class="song-title">{{ song.songTitle }}</p>
      <p class="song-artist">{{ song.artistName }}</p>
    </div>
    <button
      type="button"
      class="favorite-toggle favorite-on"
      (click)="remove(song.songId)"
      aria-label="Remove from favorites">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M12 20.8 4.9 13.9a4.8 4.8 0 0 1 0-6.9 5 5 0 0 1 7 0L12 8l.1-.1a5 5 0 0 1 7 0 4.8 4.8 0 0 1 0 6.9Z"
        />
      </svg>
    </button>
  </div>
</section>
