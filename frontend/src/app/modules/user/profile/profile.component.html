<section class="ui-page">
  <div class="ui-card profile-card">
    <h2 class="ui-title">My Profile</h2>
    <p class="ui-subtitle">Create or update your user profile.</p>

    <p *ngIf="errorMessage" class="ui-message ui-message-error">{{ errorMessage }}</p>

    <div class="ui-form">
      <div class="ui-field">
        <label>Username</label>
        <input [(ngModel)]="form.username" />
      </div>

      <div class="ui-field">
        <label>Bio</label>
        <textarea [(ngModel)]="form.bio"></textarea>
      </div>

      <div class="ui-field">
        <label>Profile Image URL</label>
        <input [(ngModel)]="form.profileImageUrl" />
      </div>
    </div>

    <div class="ui-actions">
      <button type="button" (click)="save()" [disabled]="loading">
        {{ loading ? 'Saving...' : (creating ? 'Create Profile' : 'Update Profile') }}
      </button>
      <button type="button" class="ui-btn-secondary" (click)="validateToken()">Validate Token</button>
      <button type="button" class="ui-btn-secondary" (click)="refreshToken()">Refresh Token</button>
      <button type="button" class="ui-btn-secondary" (click)="logout()">Logout</button>
    </div>

    <hr />

    <h3>Statistics</h3>
    <div class="stats-grid">
      <p>Total Playlists: {{ stats.playlistCount }}</p>
      <p>Total Favorites: {{ stats.favoriteCount }}</p>
      <p>Total Listening Time: {{ stats.totalListeningTime }}</p>
    </div>
  </div>
</section>
