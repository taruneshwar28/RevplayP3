<div class="app-shell">
  <header class="top-nav" *ngIf="authService.isLoggedIn() && !router.url.startsWith('/home')">
    <div class="nav-left">
      <div class="brand">RevPlay</div>
      <div class="nav-search-wrap" *ngIf="authService.getUserRole() === 'USER'">
        <form class="nav-search" (ngSubmit)="onSearch()">
          <input
            type="text"
            name="globalSearch"
            placeholder="Search songs or artists"
            [(ngModel)]="searchTerm"
            (focus)="onSearchFocus()"
          />
        </form>
        <div class="nav-filters">
          <input
            type="text"
            name="artistFilter"
            placeholder="Filter by artist"
            [(ngModel)]="artistFilter"
          />
          <input
            type="text"
            name="albumFilter"
            placeholder="Filter by album"
            [(ngModel)]="albumFilter"
          />
          <input
            type="text"
            name="genreFilter"
            placeholder="Filter by genre"
            [(ngModel)]="genreFilter"
          />
          <input
            type="date"
            name="dateFilter"
            [(ngModel)]="dateFilter"
          />
          <select name="sortOption" [(ngModel)]="sortOption">
            <option value="none">Sort: none</option>
            <option value="titleAsc">Title A-Z</option>
            <option value="titleDesc">Title Z-A</option>
            <option value="artistAsc">Artist A-Z</option>
            <option value="playsDesc">Most played</option>
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
          <button type="button" (click)="applyFilters()">Apply</button>
          <button type="button" class="nav-clear-btn" (click)="clearFilters()">Clear</button>
        </div>
      </div>
    </div>
    <nav class="nav-links" *ngIf="authService.getUserRole() === 'USER'">
      <a routerLink="/player" routerLinkActive="active">Player</a>
      <a routerLink="/history" routerLinkActive="active">History</a>
      <a routerLink="/browse" routerLinkActive="active">Browse</a>
      <a routerLink="/favorites" routerLinkActive="active">Favorites</a>
      <a routerLink="/playlists" routerLinkActive="active">Playlists</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
    </nav>
    <nav class="nav-links" *ngIf="authService.getUserRole() === 'ARTIST'">
      <a routerLink="/artist/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/artist/upload-song" routerLinkActive="active">Upload Song</a>
      <a routerLink="/artist/my-songs" routerLinkActive="active">My Songs</a>
      <a routerLink="/artist/manage-albums" routerLinkActive="active">Albums</a>
      <a routerLink="/artist/profile" routerLinkActive="active">Profile</a>
    </nav>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
